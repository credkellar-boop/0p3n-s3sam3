apiVersion: v1
kind: Pod
metadata:
  name: secured-runtime-pod
  labels:
    tier: production
spec:
  containers:
  - name: secure-app-container
    image: alpine:3.20
    command: ["sleep", "3600"]
    
    # Restrict permissions and kernel configurations at runtime
    securityContext:
      # Prevent the binary process from escalating privileges during running cycles
      allowPrivilegeEscalation: false
      
      # Force the execution layer to remain completely rootless
      runAsNonRoot: true
      runAsUser: 10001
      runAsGroup: 10001
      
      # Protect the container infrastructure layout from file injections
      readOnlyRootFilesystem: true
      
      # Purge unnecessary standard Linux capabilities from the execution context
      capabilities:
        drop:
        - ALL
        
