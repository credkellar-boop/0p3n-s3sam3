name: Security Secret Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  scan-secrets:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the full commit history
      - name: Checkout Code History
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Audit the codebase using Gitleaks to catch exposed credentials
      - name: Run Gitleaks Analysis
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
