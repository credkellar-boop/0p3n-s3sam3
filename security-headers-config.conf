# Nginx Secure HTTP Response Headers Configuration Block
# Restricts frame injections, script execution contexts, and clickjacking threats

# 1. Enforce HTTP Strict Transport Security (HSTS)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# 2. Mitigate Clickjacking Attacks via Frame Controls
add_header X-Frame-Options "DENY" always;

# 3. Enforce Content Type Sniffing Defenses
add_header X-Content-Type-Options "nosniff" always;

# 4. Control Cross-Origin Referrer Disclosures
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# 5. Baseline Content Security Policy (CSP) Template
# Restricts resource fetching exclusively to the originating domain
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none'; base-uri 'self';" always;
